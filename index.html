<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>tradtrash</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #5a0000;
            color: white;
        }

        header {
            position: relative;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .logo {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 120px;
            height: auto;
        }

        main {
            padding: 20px;
            min-height: 80vh;
        }

        footer {
            background-color: #3a3a3a;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        /* BOTÓN GRANDE TIPO BLOQUE */
        .btn-tattoos {
            display: block;
            width: 100%;
            margin-top: 20px;
            text-decoration: none;
        }

        .btn-tattoos img {
            width: 100%;
            aspect-ratio: 1 / 1; /* cuadrado */
            object-fit: cover;
            border-radius: 12px;
        }

        .btn-tattoos span {
            display: block;
            margin-top: 10px;
            font-size: 20px;
            text-align: center;
            color: white;
        }

        .btn-tattoos:hover img {
            transform: scale(1.03);
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <header>
        <h1>tradtrash</h1>
        <img src="diablo tradtrash.png" alt="logo" class="logo">
    </header>

    <main>
        <h2>Bienvenido</h2>

        <!-- BOTÓN TATTOOS -->
        <a href="tattoos.html" class="btn-tattoos">
            <img src="tattoo1.jfif" alt="Tattoos">
            <span>Tattoos</span>
        </a>

    </main>

    <footer>
        <p>© 2026 FISURAS S.A ® - Todos los derechos reservados</p>
    </footer>

</body>
</html>
