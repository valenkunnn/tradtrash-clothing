<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>tradtrash</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #5a0000;
            color: white;
        }

        header {
            position: relative;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .logo {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 120px;
            height: auto;
        }

        main {
            padding: 20px;
            min-height: 80vh;
        }

        footer {
            background-color: #3a3a3a;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        /* Botón */
        .btn-tattoos {
            background-color: black;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-tattoos:hover {
            background-color: #222;
        }

        /* Imágenes */
        .tattoo-img {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>tradtrash</h1>
        <img src="diablo tradtrash.png" alt="logo" class="logo">
    </header>

    <main>
        <h2>Bienvenido</h2>

        <!-- Botón -->
        <button onclick="mostrarTattoos()" class="btn-tattoos">Tattoos</button>

        <!-- Sección oculta -->
        <div id="seccion-tattoos" style="display: none;">
            <h2>Tattoos</h2>

            <img src="tattoo1.jpg" class="tattoo-img">
            <img src="tattoo2.jpg" class="tattoo-img">
            <img src="tattoo3.jpg" class="tattoo-img">
        </div>
    </main>

    <footer>
        <p>© 2026 FISURAS S.A ® - Todos los derechos reservados</p>
    </footer>

    <script>
        function mostrarTattoos() {
            var seccion = document.getElementById("seccion-tattoos");

            if (seccion.style.display === "none") {
                seccion.style.display = "block";
            } else {
                seccion.style.display = "none";
            }
        }
    </script>

</body>
</html>
